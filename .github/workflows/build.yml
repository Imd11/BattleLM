name: Build BattleLM

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Install dependencies
        run: cd flutter_app && flutter pub get

      - name: Build macOS
        run: cd flutter_app && flutter build macos --release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: battle-lm-macos
          path: flutter_app/build/macos/Build/Products/Release/battle_lm.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Install dependencies
        run: cd flutter_app && flutter pub get

      - name: Build Windows
        run: cd flutter_app && flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: battle-lm-windows
          path: flutter_app/build/windows/x64/runner/Release

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev pkg-config liblzma-dev libstdc++-12-dev

      - name: Install dependencies
        run: cd flutter_app && flutter pub get

      - name: Build Linux
        run: cd flutter_app && flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: battle-lm-linux
          path: flutter_app/build/linux/x64/release/bundle

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install dependencies
        run: |
          cd flutter_app
          set -o pipefail
          flutter pub get
          flutter build apk --release --verbose 2>&1 | tee build.log

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: flutter_app/build.log

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: battle-lm-android
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Install dependencies
        run: cd flutter_app && flutter pub get

      - name: Build iOS
        run: cd flutter_app && flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: battle-lm-ios
          path: flutter_app/build/ios/iphoneos/Runner.app

  release:
    needs: [build-macos, build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: battle-lm-macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: battle-lm-windows
          path: windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: battle-lm-linux
          path: linux

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: battle-lm-android
          path: android

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
