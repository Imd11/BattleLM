name: battle_lm
description: "BattleLM - AI Battle Platform with multi-platform support"
publish_to: 'none'
version: 1.0.7+7

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # WebSocket & Network
  web_socket_channel: ^3.0.1
  crypto: ^3.0.3
  cryptography: ^2.7.0

  # Terminal Emulation
  xterm: ^4.0.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Storage
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  sqflite: ^2.4.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  http: ^1.2.2
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/fonts/
    - assets/bridge/

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-VariableFont.ttf
